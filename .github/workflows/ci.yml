name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Check Files
        run: ls -la

      - name: Validate HTML
        run: |
          if [ -f index.html ]; then
            echo "HTML file exists"
          else
            exit 1
          fi
